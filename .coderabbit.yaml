# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
reviews:
  high_level_summary: true
  review_status: true
  collapse_walkthrough: false

  path_filters:
    - "!node_modules/**"
    - "!dist/**"
    - "!build/**"
    - "!electron/dist/**"
    - "!*.dll"
    - "!*.exe"
    - "!coverage/**"
    - "!*.log"
    - "!*.lock"

  labeling_instructions:
    - label: "bug"
      instructions: "Apply when PR title or description contains: fix, error, bug, crash"
    - label: "feature"
      instructions: "Apply when PR title or description contains: feat, add, support, implement"
    - label: "refactor"
      instructions: "Apply when PR title or description contains: refactor, cleanup"
    - label: "docs"
      instructions: "Apply when PR title or description contains: docs, readme, documentation"
    - label: "test"
      instructions: "Apply when PR title or description contains: test, tests, coverage"

  pre_merge_checks:
    title:
      mode: warning
      requirements: "Title should follow conventional commit format"
    description:
      mode: warning
    docstrings:
      mode: warning
      threshold: 60

  auto_review:
    enabled: true
    base_branches:
      - "^main$"
      - "^dev$"
      - "^develop$"
    drafts: false
    auto_incremental_review: true

chat:
  auto_reply: true
